name: ActualCompanion
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.0'
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: NO
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0
targets:
  ActualCompanion:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Config/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.actualcompanion
        PRODUCT_NAME: ActualCompanion
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Config/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    dependencies:
      - package: GRDB
  ActualCompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.actualcompanion.tests
    dependencies:
      - target: ActualCompanion
      - package: GRDB
schemes:
  ActualCompanion:
    build:
      targets:
        ActualCompanion: all
        ActualCompanionTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ActualCompanionTests
